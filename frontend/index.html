<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* -----------------------------------------------------------------------
       Design tokens
    ----------------------------------------------------------------------- */
    :root {
      --bg:          #080c12;
      --surface-1:   #0d1320;
      --surface-2:   #111827;
      --border:      #1e2d45;
      --border-focus:#2d4068;

      --text-primary: #e2e8f0;
      --text-secondary: #7d93b4;
      --text-muted:   #4a617e;

      --accent:      #3b82f6;
      --accent-dim:  rgba(59,130,246,.15);
      --accent-border: rgba(59,130,246,.35);

      --high:        #ef4444;
      --high-dim:    rgba(239,68,68,.12);
      --high-border: rgba(239,68,68,.4);

      --medium:      #f59e0b;
      --medium-dim:  rgba(245,158,11,.12);
      --medium-border: rgba(245,158,11,.4);

      --low:         #22c55e;
      --low-dim:     rgba(34,197,94,.12);
      --low-border:  rgba(34,197,94,.4);

      --done-border: rgba(34,197,94,.35);

      --danger:      #ef4444;
      --danger-dim:  rgba(239,68,68,.1);
      --danger-border: rgba(239,68,68,.4);

      --ok-text:     #86efac;
      --ok-bg:       rgba(34,197,94,.08);
      --ok-border:   rgba(34,197,94,.35);

      --err-text:    #fca5a5;
      --err-bg:      rgba(239,68,68,.08);
      --err-border:  rgba(239,68,68,.4);

      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   14px;

      --font-sans:   'IBM Plex Sans', system-ui, sans-serif;
      --font-mono:   'IBM Plex Mono', monospace;
    }

    /* -----------------------------------------------------------------------
       Reset + base
    ----------------------------------------------------------------------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* -----------------------------------------------------------------------
       Layout
    ----------------------------------------------------------------------- */
    .app-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,18,.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .4px;
      color: var(--text-primary);
    }

    .topbar-version {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.ok::before  { background: var(--low); }
    .status-dot.err::before { background: var(--high); }

    .content {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .content { grid-template-columns: 1fr; }
    }

    /* -----------------------------------------------------------------------
       Panels
    ----------------------------------------------------------------------- */
    .panel {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .panel-body {
      padding: 18px;
    }

    /* -----------------------------------------------------------------------
       Form elements
    ----------------------------------------------------------------------- */
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    textarea,
    input[type="text"],
    input[type="date"],
    select {
      display: block;
      width: 100%;
      padding: 9px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }

    textarea:focus,
    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus {
      border-color: var(--border-focus);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      line-height: 1.55;
    }

    select option { background: var(--surface-2); }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    /* -----------------------------------------------------------------------
       Buttons
    ----------------------------------------------------------------------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, border-color .12s, transform .06s;
      white-space: nowrap;
    }
    .btn:hover  { background: #1a2540; border-color: var(--border-focus); }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: #93c5fd;
    }
    .btn-primary:hover { background: rgba(59,130,246,.22); border-color: var(--accent); }

    .btn-danger {
      background: var(--danger-dim);
      border-color: var(--danger-border);
      color: #fca5a5;
    }
    .btn-danger:hover { background: rgba(239,68,68,.18); }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.04); border-color: var(--border); }

    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm); }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* -----------------------------------------------------------------------
       Badges / chips
    ----------------------------------------------------------------------- */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .4px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--surface-2);
    }

    .badge-high   { color: var(--high);   background: var(--high-dim);   border-color: var(--high-border); }
    .badge-medium { color: var(--medium); background: var(--medium-dim); border-color: var(--medium-border); }
    .badge-low    { color: var(--low);    background: var(--low-dim);    border-color: var(--low-border); }
    .badge-done   { color: var(--low);    background: var(--low-dim);    border-color: var(--done-border); }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(30,45,69,.6);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    /* -----------------------------------------------------------------------
       Stats bar
    ----------------------------------------------------------------------- */
    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,19,32,.6);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
    }
    .stat-item b { color: var(--text-primary); font-weight: 700; }

    /* -----------------------------------------------------------------------
       Task card
    ----------------------------------------------------------------------- */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      transition: border-color .15s;
    }
    .task-card:hover { border-color: var(--border-focus); }
    .task-card.is-done { opacity: .55; }

    .task-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .task-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .task-step {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .task-step-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* -----------------------------------------------------------------------
       Section dividers
    ----------------------------------------------------------------------- */
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 0 6px;
    }

    .overdue-section .task-card {
      border-left: 2px solid var(--high-border);
    }

    /* -----------------------------------------------------------------------
       Empty state
    ----------------------------------------------------------------------- */
    .empty-state {
      padding: 28px 18px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
    }

    /* -----------------------------------------------------------------------
       Notices
    ----------------------------------------------------------------------- */
    .notice {
      display: none;
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-md);
      font-size: 13px;
      white-space: pre-wrap;
    }
    .notice.err {
      background: var(--err-bg);
      border: 1px solid var(--err-border);
      color: var(--err-text);
    }
    .notice.ok {
      background: var(--ok-bg);
      border: 1px solid var(--ok-border);
      color: var(--ok-text);
    }
    .notice.visible { display: block; }

    /* -----------------------------------------------------------------------
       Right sidebar
    ----------------------------------------------------------------------- */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-section { display: flex; flex-direction: column; gap: 10px; }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .filter-span { grid-column: 1 / -1; }

    /* -----------------------------------------------------------------------
       Today panel inside sidebar
    ----------------------------------------------------------------------- */
    .today-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    /* -----------------------------------------------------------------------
       Mono accents
    ----------------------------------------------------------------------- */
    code {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #7dd3fc;
      background: rgba(56,189,248,.08);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .mono { font-family: var(--font-mono); }

    /* -----------------------------------------------------------------------
       Checkbox
    ----------------------------------------------------------------------- */
    input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* -----------------------------------------------------------------------
       Utility
    ----------------------------------------------------------------------- */
    .mt-10 { margin-top: 10px; }
    .mt-14 { margin-top: 14px; }
    .gap-8  { gap: 8px; }
  </style>
</head>

<body>
<div class="app-shell">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="topbar-title">Task Manager</span>
      <span class="topbar-version">v2.0</span>
    </div>
    <div class="topbar-meta">
      <span id="serverStatus" class="status-dot">server</span>
      <span id="clockDisplay" class="mono" style="font-size:12px;"></span>
    </div>
  </header>

  <!-- Main content -->
  <main class="content">

    <!-- Left column: Add + Task list -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Add tasks panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Add Tasks</span>
          <div class="btn-row">
            <button class="btn btn-ghost btn-sm" id="btnExample">Load example</button>
            <button class="btn btn-ghost btn-sm" id="btnClearText">Clear</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Input — one task per line, or separated by semicolons</label>
            <textarea id="txt" placeholder="- call the client&#10;- buy milk&#10;- send the invoice&#10;- clean the office"></textarea>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="btnAdd">Add tasks</button>
            <button class="btn" id="btnAddAI" title="Requires OpenAI API key">Add with AI</button>
          </div>
          <div class="notice err" id="addErr"></div>
          <div class="notice ok"  id="addOk"></div>
        </div>
      </div>

      <!-- Task list panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Tasks</span>
          <button class="btn btn-ghost btn-sm" id="btnReload">Refresh</button>
        </div>

        <div class="stats-bar" id="statsBar"></div>

        <div class="panel-body">
          <div class="task-list" id="taskList"></div>
          <div class="notice err" id="loadErr"></div>
        </div>
      </div>

    </div>

    <!-- Right sidebar -->
    <aside class="sidebar">

      <!-- Filters -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Filters</span>
        </div>
        <div class="panel-body">
          <div class="filter-grid">
            <div class="field">
              <label>Status</label>
              <select id="filterDone">
                <option value="">All</option>
                <option value="false">Pending</option>
                <option value="true">Done</option>
              </select>
            </div>
            <div class="field">
              <label>Priority</label>
              <select id="filterPriority">
                <option value="">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="field filter-span">
              <label>Sort by</label>
              <select id="filterSort">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="prio">Priority</option>
                <option value="estimate">Estimate</option>
                <option value="deadline">Deadline</option>
              </select>
            </div>
            <div class="field filter-span">
              <label>Search</label>
              <input type="text" id="filterQ" placeholder="Title or next step..." />
            </div>
            <div class="field filter-span">
              <label>Tag</label>
              <input type="text" id="filterTag" placeholder="e.g. work, finance" />
            </div>
          </div>
          <div class="btn-row mt-10">
            <button class="btn btn-primary btn-sm" id="btnLoad">Apply filters</button>
            <button class="btn btn-ghost btn-sm"  id="btnReset">Reset</button>
          </div>
          <div class="notice err" id="filterErr"></div>
        </div>
      </div>

      <!-- Today panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Today</span>
          <button class="btn btn-ghost btn-sm" id="btnToday">Load</button>
        </div>
        <div class="panel-body">
          <label class="inline-check">
            <input type="checkbox" id="includeDoneToday" />
            Include completed tasks
          </label>
          <div class="notice err" id="todayErr"></div>
          <div id="todayBox" class="mt-10"></div>
        </div>
      </div>

    </aside>
  </main>
</div>

<script>
  "use strict";

  // -------------------------------------------------------------------------
  // Utilities
  // -------------------------------------------------------------------------

  function byId(id) {
    return document.getElementById(id);
  }

  function escHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function notice(el, type, msg) {
    el.className = `notice ${type} visible`;
    el.textContent = msg;
  }

  function clearNotice(el) {
    el.className = "notice";
    el.textContent = "";
  }

  async function apiFetch(path, options = {}) {
    const res = await fetch(path, {
      headers: { "Content-Type": "application/json" },
      ...options,
    });
    if (!res.ok) {
      const body = await res.text().catch(() => "");
      throw new Error(`${res.status} ${res.statusText}${body ? ": " + body : ""}`);
    }
    return res.json();
  }

  function todayIso() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }

  // -------------------------------------------------------------------------
  // Rendering helpers
  // -------------------------------------------------------------------------

  function priorityBadge(p) {
    const cls = p === "high" ? "badge-high" : p === "medium" ? "badge-medium" : "badge-low";
    return `<span class="badge ${cls}">${escHtml(p).toUpperCase()}</span>`;
  }

  function estimateBadge(min) {
    return `<span class="badge mono">${escHtml(min)} min</span>`;
  }

  function deadlineBadge(d) {
    if (!d) return "";
    const today = todayIso();
    const isOverdue = d < today;
    const style = isOverdue ? "badge-high" : "";
    return `<span class="badge ${style}">${escHtml(d)}</span>`;
  }

  function doneBadge(done) {
    return done ? `<span class="badge badge-done">DONE</span>` : "";
  }

  function idBadge(id) {
    return `<span class="badge mono">#${escHtml(id)}</span>`;
  }

  function tagChips(tags) {
    if (!tags || !tags.length) return "";
    return tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join("");
  }

  function renderTask(task) {
    const doneClass = task.done ? " is-done" : "";
    return `
      <div class="task-card${doneClass}" data-id="${task.id}">
        <div class="task-card-header">
          <div style="flex:1;min-width:0;">
            <div class="task-title">${escHtml(task.title)}</div>
            <div class="task-meta">
              ${idBadge(task.id)}
              ${priorityBadge(task.priority)}
              ${estimateBadge(task.estimate_min)}
              ${deadlineBadge(task.deadline)}
              ${doneBadge(task.done)}
              ${tagChips(task.tags)}
            </div>
          </div>
          <div class="task-actions">
            <button class="btn btn-sm" onclick="toggleDone(${task.id})">
              ${task.done ? "Mark pending" : "Mark done"}
            </button>
            <button class="btn btn-sm" onclick="setDeadlineToday(${task.id})">Set deadline today</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">Delete</button>
          </div>
        </div>
        ${task.next_step ? `
          <div class="task-step">
            <div class="task-step-label">Next step</div>
            ${escHtml(task.next_step)}
          </div>
        ` : ""}
      </div>
    `;
  }

  function renderTaskList(tasks) {
    if (!tasks.length) {
      return `<div class="empty-state">No tasks match the current filters.</div>`;
    }
    return tasks.map(renderTask).join("");
  }

  // -------------------------------------------------------------------------
  // Stats
  // -------------------------------------------------------------------------

  async function loadStats() {
    try {
      const st = await apiFetch("/stats");
      const rate = st.completion_rate ?? 0;
      byId("statsBar").innerHTML = `
        <div class="stat-item">Total <b>${st.total}</b></div>
        <div class="stat-item">Done <b>${st.done}</b></div>
        <div class="stat-item">Pending <b>${st.pending}</b></div>
        <div class="stat-item">Rate <b>${rate}%</b></div>
        <div class="stat-item">HIGH <b>${st.by_priority?.high ?? 0}</b></div>
        <div class="stat-item">MED <b>${st.by_priority?.medium ?? 0}</b></div>
        <div class="stat-item">LOW <b>${st.by_priority?.low ?? 0}</b></div>
        <div class="stat-item">Avg <b>${st.avg_estimate_min} min</b></div>
      `;
    } catch (err) {
      console.warn("Stats load failed:", err);
    }
  }

  // -------------------------------------------------------------------------
  // Task list
  // -------------------------------------------------------------------------

  function buildQuery() {
    const params = new URLSearchParams();
    const done     = byId("filterDone").value;
    const priority = byId("filterPriority").value;
    const sort     = byId("filterSort").value;
    const q        = byId("filterQ").value.trim();
    const tag      = byId("filterTag").value.trim();

    if (done)     params.set("done", done);
    if (priority) params.set("priority", priority);
    if (sort)     params.set("sort", sort);
    if (q)        params.set("q", q);
    if (tag)      params.set("tag", tag);

    return params.toString();
  }

  async function loadTasks() {
    clearNotice(byId("filterErr"));
    try {
      const qs = buildQuery();
      const tasks = await apiFetch(qs ? `/tasks?${qs}` : "/tasks");
      byId("taskList").innerHTML = renderTaskList(tasks);
      await loadStats();
    } catch (err) {
      notice(byId("filterErr"), "err", String(err));
    }
  }

  // -------------------------------------------------------------------------
  // Today
  // -------------------------------------------------------------------------

  async function loadToday() {
    clearNotice(byId("todayErr"));
    try {
      const include = byId("includeDoneToday").checked ? "true" : "false";
      const data = await apiFetch(`/today?include_done=${include}`);

      const summaryHtml = `
        <div class="today-summary">
          <div class="stat-item">Today <b>${data.today.length}</b></div>
          <div class="stat-item">Overdue <b>${data.overdue.length}</b></div>
          <div class="stat-item">Est. <b>${data.total_estimated_minutes_today} min</b></div>
        </div>
      `;

      const todayHtml = data.today.length
        ? data.today.map(renderTask).join("")
        : `<div class="empty-state">No tasks scheduled for today.</div>`;

      const overdueHtml = data.overdue.length
        ? data.overdue.map(renderTask).join("")
        : `<div class="empty-state">No overdue tasks.</div>`;

      byId("todayBox").innerHTML = `
        ${summaryHtml}
        <div class="section-label">Today</div>
        <div class="task-list">${todayHtml}</div>
        <div class="section-label overdue-section" style="margin-top:14px;">Overdue</div>
        <div class="task-list overdue-section">${overdueHtml}</div>
      `;
    } catch (err) {
      notice(byId("todayErr"), "err", String(err));
    }
  }

  // -------------------------------------------------------------------------
  // Add tasks
  // -------------------------------------------------------------------------

  async function addSmart(useAI = false) {
    clearNotice(byId("addErr"));
    clearNotice(byId("addOk"));

    const text = byId("txt").value.trim();
    if (!text) {
      notice(byId("addErr"), "err", "Enter at least one task.");
      return;
    }

    try {
      const endpoint = useAI ? "/smart_add_ai" : "/smart_add";
      const res = await apiFetch(endpoint, {
        method: "POST",
        body: JSON.stringify({ text }),
      });

      const ids = res.inserted_ids;
      notice(byId("addOk"), "ok", `Inserted ${ids.length} task${ids.length !== 1 ? "s" : ""} — IDs: ${ids.join(", ")}`);
      byId("txt").value = "";
      await loadTasks();
    } catch (err) {
      notice(byId("addErr"), "err", String(err));
    }
  }

  // -------------------------------------------------------------------------
  // Task actions
  // -------------------------------------------------------------------------

  async function toggleDone(id) {
    try {
      await apiFetch(`/tasks/${id}/done`, { method: "PATCH" });
      await loadTasks();
    } catch (err) {
      console.error("toggleDone failed:", err);
    }
  }

  async function deleteTask(id) {
    if (!confirm(`Delete task #${id}?`)) return;
    try {
      await apiFetch(`/tasks/${id}`, { method: "DELETE" });
      await loadTasks();
    } catch (err) {
      console.error("deleteTask failed:", err);
    }
  }

  async function setDeadlineToday(id) {
    try {
      await apiFetch(`/tasks/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ deadline: todayIso() }),
      });
      await loadTasks();
    } catch (err) {
      console.error("setDeadlineToday failed:", err);
    }
  }

  // -------------------------------------------------------------------------
  // Filters
  // -------------------------------------------------------------------------

  function resetFilters() {
    byId("filterDone").value     = "";
    byId("filterPriority").value = "";
    byId("filterSort").value     = "newest";
    byId("filterQ").value        = "";
    byId("filterTag").value      = "";
  }

  // -------------------------------------------------------------------------
  // Clock + server ping
  // -------------------------------------------------------------------------

  function updateClock() {
    byId("clockDisplay").textContent = new Date().toLocaleString("sk-SK");
  }
  updateClock();
  setInterval(updateClock, 60_000);

  async function pingServer() {
    const el = byId("serverStatus");
    try {
      await apiFetch("/");
      el.textContent = "server";
      el.className = "status-dot ok";
    } catch {
      el.textContent = "server offline";
      el.className = "status-dot err";
    }
  }
  pingServer();
  setInterval(pingServer, 60_000);

  // -------------------------------------------------------------------------
  // Event wiring
  // -------------------------------------------------------------------------

  byId("btnAdd").addEventListener("click", () => addSmart(false));
  byId("btnAddAI").addEventListener("click", () => addSmart(true));
  byId("btnReload").addEventListener("click", loadTasks);
  byId("btnLoad").addEventListener("click", loadTasks);
  byId("btnReset").addEventListener("click", () => { resetFilters(); loadTasks(); });
  byId("btnToday").addEventListener("click", loadToday);

  byId("btnExample").addEventListener("click", () => {
    byId("txt").value = "- call the client\n- buy milk\n- send the invoice\n- clean the office";
  });
  byId("btnClearText").addEventListener("click", () => { byId("txt").value = ""; });

  ["filterDone", "filterPriority", "filterSort"].forEach(id => {
    byId(id).addEventListener("change", loadTasks);
  });

  let debounceTimer = null;
  ["filterQ", "filterTag"].forEach(id => {
    byId(id).addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadTasks, 280);
    });
  });

  // -------------------------------------------------------------------------
  // Initial load
  // -------------------------------------------------------------------------

  loadTasks();
</script>
</body>
</html>
